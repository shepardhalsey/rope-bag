<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

:root {
–bg: #0d0d0d;
–surface: #161616;
–border: #2a2a2a;
–accent: #e8ff47;
–accent2: #ff4747;
–text: #f0f0f0;
–muted: #555;
–done: #1e2e00;
–done-border: #4a6800;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
padding: 20px 16px 60px;
}

h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(2.4rem, 8vw, 4rem);
letter-spacing: 0.04em;
color: var(–accent);
line-height: 1;
margin-bottom: 4px;
}

.subtitle {
color: var(–muted);
font-size: 0.72rem;
letter-spacing: 0.12em;
text-transform: uppercase;
margin-bottom: 24px;
}

/* Progress bar */
.progress-wrap {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
height: 6px;
margin-bottom: 28px;
overflow: hidden;
}
.progress-fill {
height: 100%;
background: var(–accent);
transition: width 0.4s ease;
border-radius: 2px;
}

/* Phase header */
.phase {
margin-bottom: 20px;
}

.phase-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.1rem;
letter-spacing: 0.1em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 10px;
padding-left: 4px;
border-left: 3px solid var(–border);
padding-left: 8px;
}

.phase-label.active-phase { border-color: var(–accent); color: var(–accent); }
.phase-label.done-phase { border-color: var(–done-border); color: var(–done-border); }

/* Round card */
.round-card {
border: 1px solid var(–border);
border-radius: 4px;
background: var(–surface);
margin-bottom: 10px;
overflow: hidden;
transition: border-color 0.2s;
}

.round-card.active { border-color: var(–accent); }
.round-card.completed { background: var(–done); border-color: var(–done-border); }

.round-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 14px;
cursor: pointer;
user-select: none;
gap: 10px;
}

.round-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.15rem;
letter-spacing: 0.06em;
flex: 1;
}

.round-card.completed .round-title { color: var(–done-border); }

.badge {
font-size: 0.65rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 3px 8px;
border-radius: 2px;
border: 1px solid var(–border);
color: var(–muted);
white-space: nowrap;
}

.round-card.active .badge { border-color: var(–accent); color: var(–accent); background: rgba(232,255,71,0.07); }
.round-card.completed .badge { border-color: var(–done-border); color: var(–done-border); }

/* Timer */
.timer-block {
display: flex;
align-items: center;
gap: 10px;
padding: 0 14px 14px;
border-top: 1px solid var(–border);
padding-top: 12px;
}

.round-card.active .timer-block { border-color: rgba(232,255,71,0.2); }
.round-card.completed .timer-block { border-color: var(–done-border); }

.timer-display {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.4rem;
letter-spacing: 0.06em;
min-width: 90px;
color: var(–accent);
line-height: 1;
}

.round-card.completed .timer-display { color: var(–done-border); }

.timer-btn {
background: var(–accent);
color: #0d0d0d;
border: none;
border-radius: 2px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1rem;
letter-spacing: 0.08em;
padding: 7px 16px;
cursor: pointer;
transition: opacity 0.15s;
}

.timer-btn:hover { opacity: 0.85; }
.timer-btn.danger { background: var(–accent2); }
.round-card.completed .timer-btn { background: var(–done-border); color: #0d0d0d; }

/* Circuit items */
.circuit-block {
padding: 4px 14px 14px;
}

.circuit-title {
font-size: 0.68rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 8px;
}

.circuit-grid {
display: flex;
flex-wrap: wrap;
gap: 6px;
}

.circuit-item {
font-size: 0.72rem;
padding: 5px 10px;
border: 1px solid var(–border);
border-radius: 2px;
cursor: pointer;
transition: all 0.15s;
user-select: none;
color: var(–text);
background: transparent;
}

.circuit-item.checked {
background: rgba(232,255,71,0.1);
border-color: var(–accent);
color: var(–accent);
text-decoration: line-through;
text-decoration-color: rgba(232,255,71,0.4);
}

.round-card.completed .circuit-item {
border-color: var(–done-border);
color: var(–done-border);
}

/* Expand arrow */
.expand-icon {
color: var(–muted);
font-size: 0.8rem;
transition: transform 0.2s;
}
.round-card.open .expand-icon { transform: rotate(180deg); }

.expandable { display: none; }
.round-card.open .expandable { display: block; }

/* Stats bar */
.stats {
display: flex;
gap: 20px;
margin-bottom: 24px;
flex-wrap: wrap;
}
.stat {
display: flex;
flex-direction: column;
gap: 2px;
}
.stat-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.6rem;
color: var(–accent);
line-height: 1;
}
.stat-lbl {
font-size: 0.62rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–muted);
}

/* Divider */
.section-divider {
height: 1px;
background: var(–border);
margin: 24px 0;
}

/* Kick ladder */
.ladder-grid {
display: flex;
gap: 6px;
flex-wrap: wrap;
padding: 0 14px 14px;
}
.ladder-step {
font-size: 0.72rem;
padding: 5px 10px;
border: 1px solid var(–border);
border-radius: 2px;
cursor: pointer;
user-select: none;
transition: all 0.15s;
color: var(–text);
}
.ladder-step.checked {
background: rgba(255,71,71,0.12);
border-color: var(–accent2);
color: var(–accent2);
text-decoration: line-through;
}

.reset-all {
display: block;
width: 100%;
padding: 14px;
background: transparent;
border: 1px solid var(–border);
border-radius: 2px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
letter-spacing: 0.1em;
text-transform: uppercase;
cursor: pointer;
margin-top: 32px;
transition: all 0.2s;
}
.reset-all:hover { border-color: var(–accent2); color: var(–accent2); }

.alarm-flash { animation: flash 0.6s ease 3; }
@keyframes flash {
0%,100% { background: var(–surface); }
50% { background: rgba(232,255,71,0.15); }
}
</style>

</head>
<body>

<h1>Session</h1>
<div class="subtitle">Jump Rope + Heavy Bag</div>

<div class="stats">
  <div class="stat"><span class="stat-val" id="totalRounds">0</span><span class="stat-lbl">Rounds Done</span></div>
  <div class="stat"><span class="stat-val" id="totalTime">0:00</span><span class="stat-lbl">Time Elapsed</span></div>
  <div class="stat"><span class="stat-val" id="pctDone">0%</span><span class="stat-lbl">Complete</span></div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>

<div id="workout"></div>

<button class="reset-all" onclick="resetAll()">↺ Reset Entire Session</button>

<script>
const CIRCUIT = [
  "15 Jumping Jacks",
  "15 Squats",
  "15 Push-ups",
  "15 Thrusters",
  "15 Sit-ups",
  "10 Burpees"
];

const KICK_LADDER = [];
for (let round = 1; round <= 5; round++) {
  for (let i = 1; i <= 5; i++) {
    KICK_LADDER.push(`Set ${round} — R${i}/L${i}`);
  }
  for (let i = 4; i >= 1; i--) {
    KICK_LADDER.push(`Set ${round} — R${i}/L${i}`);
  }
}

const PHASES = [
  {
    id: "rope",
    label: "Phase 1 — Jump Rope + Circuit",
    rounds: [1,2,3,4,5].map(n => ({
      id: `rope_${n}`,
      title: `Rope Round ${n}`,
      badge: "5 min",
      duration: 300,
      hasCircuit: n < 5,
    }))
  },
  {
    id: "bag",
    label: "Phase 2 — Heavy Bag",
    rounds: [1,2,3,4,5].map(n => ({
      id: `bag_${n}`,
      title: `Bag Round ${n}`,
      badge: "5 min",
      duration: 300,
      hasCircuit: false,
    }))
  },
  {
    id: "combos",
    label: "Phase 3 — Hands-Only Combos",
    rounds: [{
      id: "combos_1",
      title: "Combo Round",
      badge: "5 min",
      duration: 300,
      hasCircuit: false,
    }]
  },
  {
    id: "kicks",
    label: "Phase 4 — Roundhouse Kick Ladder",
    rounds: [{
      id: "kicks_1",
      title: "Kick Ladder",
      badge: "1↑5↓1",
      duration: 0,
      hasKicks: true,
    }]
  }
];

// State
let timers = {}; // id -> { interval, remaining, running }
let sessionStart = null;
let sessionInterval = null;
let completed = {};
let circuitChecked = {}; // id -> Set of indices
let kickChecked = {}; // id -> Set

function initState() {
  PHASES.forEach(ph => ph.rounds.forEach(r => {
    timers[r.id] = { interval: null, remaining: r.duration, running: false };
    completed[r.id] = false;
    circuitChecked[r.id] = new Set();
    kickChecked[r.id] = new Set();
  }));
}

function totalRounds() {
  return PHASES.reduce((a, ph) => a + ph.rounds.length, 0);
}

function doneCount() {
  return Object.values(completed).filter(Boolean).length;
}

function updateStats() {
  const done = doneCount();
  const total = totalRounds();
  document.getElementById('totalRounds').textContent = done;
  document.getElementById('pctDone').textContent = Math.round(done/total*100) + '%';
  document.getElementById('progressBar').style.width = (done/total*100) + '%';
}

function formatTime(s) {
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function updateElapsed() {
  if (!sessionStart) return;
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  document.getElementById('totalTime').textContent = formatTime(elapsed);
}

function startSessionClock() {
  if (sessionStart) return;
  sessionStart = Date.now();
  sessionInterval = setInterval(updateElapsed, 1000);
}

function startTimer(id, duration) {
  startSessionClock();
  const t = timers[id];
  if (t.running) return;
  t.running = true;
  const card = document.getElementById('card_' + id);
  const btn = document.getElementById('btn_' + id);
  const disp = document.getElementById('timer_' + id);
  if (btn) btn.textContent = 'PAUSE';
  t.interval = setInterval(() => {
    t.remaining--;
    if (disp) disp.textContent = formatTime(t.remaining);
    if (t.remaining <= 0) {
      clearInterval(t.interval);
      t.running = false;
      t.remaining = 0;
      if (disp) disp.textContent = '0:00';
      if (btn) btn.textContent = 'DONE';
      if (card) card.classList.add('alarm-flash');
      // auto-mark complete
      markComplete(id);
    }
  }, 1000);
}

function pauseTimer(id) {
  const t = timers[id];
  if (!t.running) return;
  clearInterval(t.interval);
  t.running = false;
  const btn = document.getElementById('btn_' + id);
  if (btn) btn.textContent = 'START';
}

function toggleTimer(id, duration) {
  const t = timers[id];
  if (t.running) pauseTimer(id);
  else startTimer(id, duration);
}

function markComplete(id) {
  completed[id] = true;
  const card = document.getElementById('card_' + id);
  if (card) {
    card.classList.remove('active', 'open');
    card.classList.add('completed');
    // update badge
    const badge = card.querySelector('.badge');
    if (badge) badge.textContent = '✓ DONE';
  }
  updateStats();
}

function toggleComplete(id) {
  if (completed[id]) {
    completed[id] = false;
    const card = document.getElementById('card_' + id);
    if (card) {
      card.classList.remove('completed');
      const badge = card.querySelector('.badge');
      const r = findRound(id);
      if (badge && r) badge.textContent = r.badge;
    }
  } else {
    pauseTimer(id);
    markComplete(id);
  }
  updateStats();
}

function findRound(id) {
  for (const ph of PHASES) {
    for (const r of ph.rounds) {
      if (r.id === id) return r;
    }
  }
  return null;
}

function toggleCircuit(roundId, idx) {
  const s = circuitChecked[roundId];
  if (s.has(idx)) s.delete(idx); else s.add(idx);
  const el = document.getElementById(`ci_${roundId}_${idx}`);
  if (el) el.classList.toggle('checked', s.has(idx));
}

function toggleKick(roundId, idx) {
  const s = kickChecked[roundId];
  if (s.has(idx)) s.delete(idx); else s.add(idx);
  const el = document.getElementById(`kick_${roundId}_${idx}`);
  if (el) el.classList.toggle('checked', s.has(idx));
}

function toggleCard(id) {
  const card = document.getElementById('card_' + id);
  if (!card || completed[id]) return;
  const isOpen = card.classList.contains('open');
  // close all
  document.querySelectorAll('.round-card.open').forEach(c => {
    c.classList.remove('open', 'active');
  });
  if (!isOpen) {
    card.classList.add('open', 'active');
  }
}

function resetAll() {
  if (!confirm('Reset entire session?')) return;
  clearInterval(sessionInterval);
  sessionStart = null;
  sessionInterval = null;
  document.getElementById('totalTime').textContent = '0:00';

  PHASES.forEach(ph => ph.rounds.forEach(r => {
    pauseTimer(r.id);
    timers[r.id] = { interval: null, remaining: r.duration, running: false };
    completed[r.id] = false;
    circuitChecked[r.id] = new Set();
    kickChecked[r.id] = new Set();
  }));
  render();
  updateStats();
}

function render() {
  const container = document.getElementById('workout');
  container.innerHTML = '';

  PHASES.forEach((ph, pi) => {
    const phDiv = document.createElement('div');
    phDiv.className = 'phase';

    const allDone = ph.rounds.every(r => completed[r.id]);
    const anyActive = ph.rounds.some(r => !completed[r.id]);

    const label = document.createElement('div');
    label.className = 'phase-label' + (allDone ? ' done-phase' : (anyActive ? ' active-phase' : ''));
    label.textContent = ph.label;
    phDiv.appendChild(label);

    ph.rounds.forEach(r => {
      const card = document.createElement('div');
      card.className = 'round-card' + (completed[r.id] ? ' completed' : '');
      card.id = 'card_' + r.id;

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'round-header';
      hdr.onclick = () => {
        if (!completed[r.id]) toggleCard(r.id);
        else toggleComplete(r.id);
      };

      const titleEl = document.createElement('span');
      titleEl.className = 'round-title';
      titleEl.textContent = r.title;

      const badgeEl = document.createElement('span');
      badgeEl.className = 'badge';
      badgeEl.textContent = completed[r.id] ? '✓ DONE' : r.badge;

      const arrow = document.createElement('span');
      arrow.className = 'expand-icon';
      arrow.textContent = '▼';

      hdr.appendChild(titleEl);
      hdr.appendChild(badgeEl);
      if (!r.hasKicks) hdr.appendChild(arrow);
      card.appendChild(hdr);

      // Expandable content
      const expandable = document.createElement('div');
      expandable.className = 'expandable';

      if (r.duration > 0) {
        const timerBlock = document.createElement('div');
        timerBlock.className = 'timer-block';

        const disp = document.createElement('div');
        disp.className = 'timer-display';
        disp.id = 'timer_' + r.id;
        disp.textContent = formatTime(r.duration);

        const btn = document.createElement('button');
        btn.className = 'timer-btn';
        btn.id = 'btn_' + r.id;
        btn.textContent = 'START';
        btn.onclick = (e) => { e.stopPropagation(); toggleTimer(r.id, r.duration); };

        const doneBtn = document.createElement('button');
        doneBtn.className = 'timer-btn danger';
        doneBtn.textContent = 'MARK DONE';
        doneBtn.onclick = (e) => { e.stopPropagation(); pauseTimer(r.id); markComplete(r.id); };

        timerBlock.appendChild(disp);
        timerBlock.appendChild(btn);
        timerBlock.appendChild(doneBtn);
        expandable.appendChild(timerBlock);
      }

      // Circuit
      if (r.hasCircuit) {
        const cb = document.createElement('div');
        cb.className = 'circuit-block';

        const ct = document.createElement('div');
        ct.className = 'circuit-title';
        ct.textContent = 'Between-Round Circuit';
        cb.appendChild(ct);

        const grid = document.createElement('div');
        grid.className = 'circuit-grid';

        CIRCUIT.forEach((ex, i) => {
          const item = document.createElement('div');
          item.className = 'circuit-item' + (circuitChecked[r.id].has(i) ? ' checked' : '');
          item.id = `ci_${r.id}_${i}`;
          item.textContent = ex;
          item.onclick = (e) => { e.stopPropagation(); toggleCircuit(r.id, i); };
          grid.appendChild(item);
        });

        cb.appendChild(grid);
        expandable.appendChild(cb);
      }

      // Kick ladder
      if (r.hasKicks) {
        const lbl = document.createElement('div');
        lbl.style.cssText = 'padding: 12px 14px 4px; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);';
        lbl.textContent = 'Right / Left — Alternating';
        expandable.className = 'expandable';
        expandable.style.display = 'block'; // always open for kicks
        expandable.appendChild(lbl);

        const lg = document.createElement('div');
        lg.className = 'ladder-grid';

        KICK_LADDER.forEach((step, i) => {
          const el = document.createElement('div');
          el.className = 'ladder-step' + (kickChecked[r.id].has(i) ? ' checked' : '');
          el.id = `kick_${r.id}_${i}`;
          el.textContent = step;
          el.onclick = () => toggleKick(r.id, i);
          lg.appendChild(el);
        });

        expandable.appendChild(lg);

        const doneBtn = document.createElement('button');
        doneBtn.className = 'timer-btn danger';
        doneBtn.style.cssText = 'margin: 0 14px 14px; font-size: 0.9rem;';
        doneBtn.textContent = 'MARK DONE';
        doneBtn.onclick = () => markComplete(r.id);
        expandable.appendChild(doneBtn);

        card.appendChild(hdr);
        card.appendChild(expandable);
        phDiv.appendChild(card);
        return;
      }

      card.appendChild(expandable);
      phDiv.appendChild(card);
    });

    if (pi < PHASES.length - 1) {
      const div = document.createElement('div');
      div.className = 'section-divider';
      phDiv.appendChild(div);
    }

    container.appendChild(phDiv);
  });

  updateStats();
}

initState();
render();
</script>

</body>
</html>
